<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <style>
        /* --- 質感黑金與高效 Scannability 遊戲介面 --- */
        :root {
            --bg-color: #181818;
            --gold-color: #D4AF37;
            --white-color: #FFFFFF;
            --card-bg: #262626;
            --text-muted: #B0B0B0;
            --correct-color: #4CAF50;
            --wrong-color: #FF5722;
            --accent-pink: #FF6B81;
            --accent-blue: #4EA8DE;
        }

        * {
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--white-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        .game-container {
            background: var(--card-bg);
            border: 3px solid var(--gold-color);
            border-radius: 20px;
            padding: 25px;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--gold-color);
            font-size: 24px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* 資訊看板 */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(212, 175, 55, 0.08);
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px dashed var(--gold-color);
        }

        .progress-text, .score-text {
            font-size: 15px;
            font-weight: bold;
        }

        .score-text span {
            color: var(--gold-color);
            font-size: 18px;
        }

        /* 題目顯示區 */
        .question-box {
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid #333;
            text-align: left;
        }

        /* 誘答選項排版 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }

        .option-btn {
            background: #2e2e2e;
            color: var(--white-color);
            border: 2px solid #444444;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            width: 100%;
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: var(--gold-color);
            background: #363636;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.15);
        }

        /* 狀態變色 */
        .option-btn.correct {
            background-color: rgba(76, 175, 80, 0.2) !important;
            border-color: var(--correct-color) !important;
            color: #81C784 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: rgba(255, 87, 34, 0.15) !important;
            border-color: var(--wrong-color) !important;
            color: #FF8A65 !important;
        }

        /* 回饋區 */
        .feedback-panel {
            min-height: 80px;
            margin-top: 10px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.15);
        }

        .hint-text {
            color: #AAAAAA;
            font-size: 13px;
            font-style: italic;
            padding: 6px 12px;
            border-radius: 15px;
            display: inline-block;
            background: rgba(255,255,255,0.03);
            text-align: left;
            width: 100%;
        }

        .result-message {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 6px;
            text-align: left;
        }

        .rationale-text {
            font-size: 14px;
            color: #DDDDDD;
            line-height: 1.5;
            text-align: left;
            padding: 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
        }

        .next-btn {
            background: linear-gradient(135deg, var(--gold-color), #B38F24);
            color: #181818;
            border: none;
            border-radius: 50px;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
            transition: all 0.2s ease;
            display: none;
        }

        .next-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.5);
        }

        .summary-view {
            display: none;
        }

        .restart-btn {
            background: linear-gradient(135deg, var(--accent-blue), #0077B6);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .trophy {
            font-size: 50px;
            margin-bottom: 10px;
            animation: float 2s ease-in-out infinite;
        }

        .animate-correct {
            animation: popCorrect 0.4s ease forwards;
        }
        @keyframes popCorrect {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 15px rgba(76, 175, 80, 0.4); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .confetti {
            position: fixed;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 999;
        }
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

            function startAdventure() {

                summaryViewEl.style.display = 'none';
                
                refreshStatus();

            function refreshStatus() {
                currentQuestEl.textContent = currentIdx + 1;
                scoreGemsEl.textContent = `💎 ${scoreGems}`;
            }

            function displayStage() {
                isAnswered = false;
                nextQuestBtn.style.display = 'none';
                optionsContainerEl.innerHTML = '';
                
                const stage = quizData[currentIdx];
                questionTextEl.textContent = stage.q;
                
                feedbackAreaEl.innerHTML = `<div class="hint-text" id="hint-display"></div>`;

                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = `<span style="margin-right:8px; font-weight:bold; color:var(--gold-color);">${String.fromCharCode(65 + i)}.</span> ${stage.o[i]}`;
                    
                    btn.onclick = function() {
                        triggerAnswer(i, btn);
                    };
                    
                    optionsContainerEl.appendChild(btn);
                }
            }

            function triggerAnswer(userPick, clickedBtn) {
                if (isAnswered) return;
                isAnswered = true;

                const stage = quizData[currentIdx];
                const btnList = optionsContainerEl.querySelectorAll('.option-btn');
                
                for (let k = 0; k < btnList.length; k++) {
                    btnList[k].disabled = true;
                }

                if (userPick === stage.c) {
                    clickedBtn.classList.add('correct');
                    clickedBtn.classList.add('animate-correct');
                    scoreGems += 10;
                    scoreGemsEl.textContent = `💎 ${scoreGems}`;
                    
                    const cheer = correctCheers[Math.floor(Math.random() * correctCheers.length)];
                    feedbackAreaEl.innerHTML = `
                        <div class="result-message" style="color:#81C784;">${cheer} ✅</div>
                        <div class="rationale-text">🎯 <b>正確醫藥觀念：</b>${stage.r[userPick]}</div>

                    createFireworks(12);
                } else {
                    clickedBtn.classList.add('wrong');
                    btnList[stage.c].classList.add('correct');

                    feedbackAreaEl.innerHTML = `

                    refreshStatus();
                    displayStage();

                    showFinalDashboard();

            };

                    finalCheerEl.textContent = `哇！太不可思議了！🎉 你通過了所有超高難度的生活誘答考驗，網路醫藥假訊息和偏方完全考不倒你！`;

                }

            }

            restartGameBtn.onclick = function() {

            function createFireworks(num) {
                const holder = document.getElementById('particle-container');
                const colors = ['#D4AF37', '#FF6B81', '#4EA8DE', '#4CAF50', '#FF9F43', '#FFFFFF'];
                
                for (let i = 0; i < num; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'confetti';
                    dot.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    dot.style.left = (Math.random() * 100) + 'vw';
                    dot.style.top = '-2vh';
                    
                    const size = (Math.random() * 7) + 5;
                    dot.style.width = size + 'px';
                    dot.style.height = size + 'px';
                    
                    dot.style.animationDuration = ((Math.random() * 1.8) + 1.2) + 's';
                    dot.style.animationDelay = (Math.random() * 0.3) + 's';
                    
                    holder.appendChild(dot);
                    
                    setTimeout(() => {
                        dot.remove();
                    }, 3000);
                }
            }

            startAdventure();
