<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社區健康守護尖兵：25題核心衛教挑戰 🌟💖</title>
    <style>
        /* --- 🎨 核心視覺：深邃質感黑、專業華麗金與高對比白 --- */
        :root {
            --bg-color: #181818;       
            --gold-color: #D4AF37;     
            --white-color: #FFFFFF;    
            --accent-green: #2ECC71;   
            --accent-pink: #FF6B81;    
            --accent-blue: #3498DB;    
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--white-color);
            font-family: 'Microsoft JhengHei', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border: 3px solid var(--gold-color);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.15);
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: var(--gold-color);
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .subtitle {
            font-size: 0.95rem;
            color: #BBBBBB;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            padding: 12px 20px;
            border-radius: 15px;
            border: 1px dashed var(--gold-color);
            margin-bottom: 25px;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .gem-score {
            color: #FFDF00;
        }

        .question-box {
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--gold-color);
            text-align: left;
        }

        .question-tag {
            font-size: 0.85rem;
            background: var(--gold-color);
            color: var(--bg-color);
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: bold;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--white-color);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1.05rem;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
            border-color: var(--gold-color);
            transform: translateY(-2px);
        }

        .option-badge {
            background: rgba(255,255,255,0.2);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            color: var(--white-color);
        }

        .correct-choice {
            background: linear-gradient(135deg, #1d976c, #93f9b9) !important;
            border-color: #2ecc71 !important;
            color: #000000 !important;
            animation: bounce 0.5s ease-in-out;
        }

        .wrong-choice {
            background: linear-gradient(135deg, #eb3349, #f45c43) !important;
            border-color: #ff6b81 !important;
            color: #ffffff !important;
        }

        .correct-choice .option-badge {
            background: rgba(0,0,0,0.2);
            color: #000;
        }

        .feedback-area {
            min-height: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--gold-color);
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 12px;
            line-height: 1.5;
            background: rgba(0,0,0,0.2);
            text-align: center;
        }

        .feedback-hint {
            font-size: 0.9rem;
            color: #DDDDDD;
            margin-top: 5px;
            font-weight: normal;
        }

        .next-container {
            display: flex;
            justify center;
        }

        .btn-next {
            background: var(--gold-color);
            color: var(--bg-color);
            border: none;
            border-radius: 50px;
            padding: 14px 45px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 175, 55, 0.4);
            transition: all 0.2s ease;
            display: none;
        }

        .btn-next:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(214, 175, 55, 0.6);
        }

        .complete-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .complete-title {
            font-size: 2rem;
            color: var(--gold-color);
            margin-bottom: 15px;
            animation: float 2s infinite alternate;
        }

        .complete-report {
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.06);
            padding: 25px;
            border-radius: 18px;
            border: 2px dashed var(--gold-color);
            text-align: left;
            width: 100%;
        }

        .btn-restart {
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
            transition: all 0.2s ease;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 999;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-container" id="quizBox">
        <h1 id="mainTitle">社區健康守護尖兵 🛡️</h1>
        <p class="subtitle">國小健康與體育・單元四核心知識評量</p>

        <div class="status-bar">

        </div>

        <div class="question-box">
            <div class="question-tag" id="qTag">載入中</div>

        <div class="options-grid" id="optionsContainer"></div>

        <div class="feedback-area" id="feedbackArea">
            <div id="feedbackText">🌟 請詳讀題幹並選出最適當的答案。</div>
            <div id="feedbackHint" class="feedback-hint"></div>
        </div>

        <div class="next-container">
            <button class="btn-next" id="btnNext" onclick="nextQuestion()">➡️ 下一題</button>
        </div>

        <div class="complete-report" id="reportDetails"></div>
        <button class="btn-restart" onclick="restartGame()">🔄 重新挑戰</button>
    </div>

            {
                tag: "✨ 防疫核心口訣",
                question: "清除登革熱病媒蚊孳生源有標準的黃金四字口訣。請問這四個步驟依序是什麼？",
                options: ["沖、脫、泡、蓋", "巡、倒、刷、清", "看、聽、想、做", "擦、抹、洗、掃"],
                correct: 1,
                hint: "課本第 67 頁清除孳生源的標準步驟為「巡、倒、刷、清」。"
            },
            {
                tag: "🔍 口訣步驟實務：巡",
                question: "在黃金口訣中，第一個步驟「巡」具體的公共衛生執行內容是什麼？",
                options: ["巡視社區走廊是否有外來陌生人出入", "經常巡檢居家內外容易積水的容器", "巡查公共道路上是否有違規停放車輛", "巡視鄰居家的家用垃圾桶有沒有蓋好"],
                correct: 1,
                hint: "課本第 67 頁：『巡』的意思是經常巡檢居家內外容易積水的容器。"
            },
            {
                tag: "🔍 口訣步驟實務：倒",
                question: "在黃金口訣中，第二個步驟「倒」除了要將積水倒掉之外，容器隨後的擺放處理動作是什麼？",
                options: ["將容器重重摔碎並直接當作垃圾丟棄", "將容器「倒置」以免再次累積雨水", "用黑色厚塑膠袋將容器開口完全封死", "把容器拿到太陽底下連續曝曬三天"],
                correct: 1,
                hint: "課本第 67 頁：『倒』的完整動作是「倒掉積水，並倒置容器」，防止雨水再次落入。"
            },
            {
                tag: "🔍 口訣步驟實務：刷",
                question: "在黃金口訣中，第三個步驟「刷」要求我們必須大力刷洗容器內壁。這樣做最主要的科學目的是什麼？",
                options: ["刷掉容器表面沉積的鐵鏽與大量青苔", "徹底刷洗清除黏附在容器壁上的病媒蚊蟲卵", "讓容器內壁光潔如新，提升外觀美感", "測試容器是否有出現肉眼難見的破損微孔"],
                correct: 1,
                hint: "課本第 67 頁：『刷』的目的是「刷洗容器，避免蟲卵再附著」在器壁上。"
            },
            {
                tag: "🔍 口訣步驟實務：清",
                question: "在黃金口訣中，第四個步驟「清」在廢棄物源頭管理上，要求我們如何落實？",
                options: ["把所有積水容器都清洗乾淨並繼續堆疊在後院", "進行「容器減量」，清除居家內外不要的容器", "把不用的廢棄容器集中傾倒在隔壁空地", "全面清空室內所有與民生無關的木製家具"],
                correct: 1,
                hint: "課本第 67 頁：『清』即是「容器減量，清除不要的容器」，從根本減少積水空間。"
            },
            {
                tag: "🦟 孳生源環境定義與判別",
                question: "病媒蚊最喜歡在什麼樣的環境特徵中產卵並孵化成孑孓，形成所謂的登革熱「孳生源」？",
                options: ["水質清澈且流速極快的自然山區溪流中", "戶內外乾淨或骯髒的「靜止積水容器」或積水處", "高溫乾燥且通風良好的高處大樓牆角", "社區中堆滿枯乾落葉的乾燥柏油路面上"],
                correct: 1,
                hint: "課本第 67 頁強調，居家內外的「積水容器」是斑蚊繁衍子代的最主要孳生源。"
            },
            {
                tag: "🌱 社區衛生集體參與價值",
                question: "綜合課本單元四的學習，全體里民與同學共同落實社區環境清潔與防疫，其最終核心目標是什麼？",
                options: ["大幅提升社區大樓的整體房屋買賣市場價值", "從源頭阻斷孳生源，讓登革熱病媒傳染病消失無蹤", "完全省下購買家用化學防蚊液的日常開銷", "讓社區中的每位參與者都考取專業的環境工程證照"],
                correct: 1,
                hint: "課本第 67 頁課文總結：大家一起來打掃，就能讓登革熱消失無蹤！維護環境，人人有責。"
            }
        ];

        let currentQIndex = 0;
        let scoreGems = 0;
        let hasAnswered = false;

        const quizBox = document.getElementById('quizBox');
        const completeBox = document.getElementById('completeBox');
        const progressText = document.getElementById('progressText');
        const scoreText = document.getElementById('scoreText');
        const qTag = document.getElementById('qTag');
        const qText = document.getElementById('qText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackText = document.getElementById('feedbackText');
        const feedbackHint = document.getElementById('feedbackHint');
        const btnNext = document.getElementById('btnNext');
        const reportDetails = document.getElementById('reportDetails');

        document.addEventListener('DOMContentLoaded', () => {
            loadQuestion();
        });

        function loadQuestion() {
            hasAnswered = false;
            btnNext.style.display = 'none';
            
            feedbackText.textContent = "💡 請仔細閱讀題目與四個選項，選出最適當的答案。";
            feedbackText.style.color = "var(--gold-color)";
            feedbackHint.textContent = "";

            const currentData = quizData[currentQIndex];
            
            progressText.textContent = '題目進度: ' + (currentQIndex + 1) + ' / ' + quizData.length + ' 📝';
            scoreText.innerHTML = '目前得分: <span class="gem-score">⭐ ' + scoreGems + '</span>';
            qTag.textContent = currentData.tag;
            qText.textContent = currentData.question;

            optionsContainer.innerHTML = '';
            currentData.options.forEach((option, idx) => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                
                const badge = document.createElement('span');
                badge.classList.add('option-badge');
                badge.textContent = String.fromCharCode(65 + idx);
                
                const textSpan = document.createElement('span');
                textSpan.textContent = option;
                
                button.appendChild(badge);
                button.appendChild(textSpan);
                
                button.onclick = function() { checkAnswer(idx, button); };
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex, clickedButton) {
            if (hasAnswered) return;
            hasAnswered = true;

            const currentData = quizData[currentQIndex];
            const allButtons = optionsContainer.querySelectorAll('.option-btn');

            allButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentData.correct) {
                clickedButton.classList.add('correct-choice');
                scoreGems += 4; 
                scoreText.innerHTML = '目前得分: <span class="gem-score">⭐ ' + scoreGems + '</span>';
                
                feedbackText.textContent = "✅ 完全正確！核心衛教知識掌握得非常好！";
                feedbackText.style.color = "#2ECC71";
            } else {
                clickedButton.classList.add('wrong-choice');
                allButtons[currentData.correct].classList.add('correct-choice');
                
                feedbackText.textContent = '❌ 答案錯誤。正確答案為 (' + String.fromCharCode(65 + currentData.correct) + ')。';
                feedbackText.style.color = "#FF6B81";
                feedbackHint.textContent = '💡 課本核心指引：' + currentData.hint;
            }

            if (currentQIndex === quizData.length - 1) {
                btnNext.textContent = "✨ 觀看綜合學習評量報告";
            } else {
                btnNext.textContent = "➡️ 下一題";
            }
            btnNext.style.display = 'block';
        }

        function nextQuestion() {
            if (currentQIndex < quizData.length - 1) {
                currentQIndex++;
                loadQuestion();
            } else {
                showCompleteScreen();
            }
        }

        function showCompleteScreen() {
            quizBox.style.display = 'none';
            completeBox.style.display = 'flex';

            let evaluation = "";
            if (scoreGems === 100) {
                evaluation = "🏆 表現極致完美！你獲得了【100分頂尖健康守護神】榮譽！你對單元四的所有垃圾分類、登革熱傳染病、病媒蚊特徵與巡倒刷清口訣有著毫無漏洞的完美理解，表現令人讚賞！";
            } else if (scoreGems >= 80) {
                evaluation = "🥇 表現非常優秀！你獲得了【社區防疫大隊長】榮譽！你已完全具備正確的居家防蚊常識與社區環保觀念，是守護健康環境的楷模！";
            } else if (scoreGems >= 60) {
                evaluation = "🥈 挑戰通過！你獲得了【健康守護小尖兵】榮譽！你已經達到了健體單元的及格評量標準，對於核心的防疫政策有了正確的認知，繼續保持！";
            } else {
                evaluation = "🧱 挑戰完成，仍需努力。你目前是【健康衛教實習生】。建議重新閱讀課本第 56 到 67 頁，特別加強記憶登革熱的症狀與『巡、倒、刷、清』的執行細節，下次一定能拿到好成績！";
            }

            reportDetails.innerHTML = '';
            
            const p1 = document.createElement('p');
            p1.style.fontSize = '1.3rem';
            p1.style.color = 'var(--gold-color)';
            p1.style.marginBottom = '15px';
            p1.style.textAlign = 'center';
            p1.style.fontWeight = 'bold';
            p1.textContent = '🎉 25題核心衛教綜合評量結束 🎉';
            
            const p2 = document.createElement('p');
            p2.style.marginBottom = '15px';
            p2.style.textAlign = 'center';
            p2.style.fontSize = '1.2rem';
            p2.innerHTML = '測驗最終總得分：<span class="gem-score" style="font-size:1.5rem; font-weight:bold;">⭐ ' + scoreGems + ' 分</span>';
            
            const p3 = document.createElement('p');
            p3.style.color = '#FFFFFF';
            p3.style.lineHeight = '1.7';
            p3.style.background = 'rgba(255,255,255,0.05)';
            p3.style.padding = '18px';
            p3.style.borderRadius = '12px';
            p3.style.border = '1px solid var(--gold-color)';
            p3.style.textAlign = 'justify';
            p3.textContent = evaluation;
            
            const p4 = document.createElement('p');
            p4.style.marginTop = '20px';
            p4.style.fontSize = '0.95rem';
            p4.style.color = '#BBB';
            p4.style.textAlign = 'center';
            p4.style.fontStyle = 'italic';
            p4.textContent = '「垃圾分類做得好，蟲鼠疾病不來找。巡倒刷清做得對，登革熱病毒全擊潰！」 🛡️🌱';
            
            reportDetails.appendChild(p1);
            reportDetails.appendChild(p2);
            reportDetails.appendChild(p3);
            reportDetails.appendChild(p4);

            triggerConfetti();
        }

        function triggerConfetti() {
            const colors = ['#FF6B81', '#2ECC71', '#3498DB', '#D4AF37', '#E67E22', '#9B59B6'];
            for (let i = 0; i < 100; i++) {
                const p = document.createElement('div');
                p.classList.add('confetti');
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = -20 - (Math.random() * 20) + 'px';
                
                const size = Math.random() * 8 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                
                const duration = Math.random() * 2.5 + 1.5;
                p.style.animationDuration = duration + 's';
                p.style.animationDelay = Math.random() * 0.8 + 's';

                document.body.appendChild(p);
                removeAfterDelay(p, (duration + 1) * 1000);
            }
        }

        function removeAfterDelay(el, delay) {
            setTimeout(() => { el.remove(); }, delay);
        }

        function restartGame() {
            currentQIndex = 0;
            scoreGems = 0;
            completeBox.style.display = 'none';
            quizBox.style.display = 'block';
            loadQuestion();
        }
    </script>
</body>
</html>
