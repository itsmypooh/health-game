<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的成長與健康生活大冒險 🌟🌱</title>
    <style>
        /* 核心魔法風格：黑、金、白與柔和點綴色 */
        :root {
            --bg-color: #181818;
            --primary-gold: #D4AF37;
            --light-gold: #F3E5AB;
            --text-white: #FFFFFF;
            --card-bg: #2A2A2A;
            --btn-hover: #3E3E3E;
            --correct-green: #2ECC71;
            --wrong-red: #E74C3C;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
            border: 2px solid var(--primary-gold);
            position: relative;
        }

        h1 {
            color: var(--primary-gold);
            text-align: center;
            font-size: 1.8rem;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 頂部進度條與資訊 */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary-gold);
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: #444;
            border-radius: 6px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-gold), #FFF);
            transition: width 0.3s ease;
        }

        /* 題目區域 */
        .question-box {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 70px;
        }

        /* 選項按鈕 */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: #333;
            color: var(--text-white);
            border: 1px solid #555;
            padding: 15px 20px;
            font-size: 1.05rem;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .option-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: var(--primary-gold);
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        /* 答題回饋效果 */
        .option-btn.correct-ans {
            background-color: var(--correct-green) !important;
            border-color: var(--correct-green) !important;
            color: #fff;
        }

        .option-btn.wrong-ans {
            background-color: var(--wrong-red) !important;
            border-color: var(--wrong-red) !important;
            color: #fff;
        }

        /* 提示與回饋面板 */
        .feedback-panel {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--primary-gold);
            animation: fadeIn 0.4s ease;
        }

        .feedback-text {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .rationale-text {
            font-size: 0.95rem;
            color: #DDD;
            line-height: 1.5;
        }

        .next-btn, .restart-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--primary-gold), #B8860B);
            color: black;
            font-weight: bold;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(212,175,55,0.3);
            transition: all 0.2s ease;
        }

        .next-btn:hover, .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(212,175,55,0.5);
        }

        .hint-toggle {
            background: none;
            border: none;
            color: var(--primary-gold);
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: underline;
            padding: 5px;
            margin-top: 10px;
        }

        .hint-box {
            display: none;
            background: #222;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--light-gold);
            margin-top: 5px;
            border-left: 3px solid var(--primary-gold);
        }

        /* 動畫特效 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-correct {
            animation: popStars 0.5s ease;
        }

        @keyframes popStars {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 20px var(--correct-green); }
            100% { transform: scale(1); }
        }

        /* 慶祝彩色碎紙粒子效果 */
        .confetti-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 99;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            opacity: 0;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(800px) rotate(360deg); opacity: 0; }
        }

        /* 結算頁面 */
        .result-screen {
            text-align: center;
            display: none;
        }

        .star-rating {
            font-size: 3rem;
            color: var(--primary-gold);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameWindow">
        <div id="confettiContainer" class="confetti-container"></div>
        
        <!-- 測驗進行畫面 -->
        <div id="quizScreen">
            <h1>🌱 我的成長與健康生活大冒險 🧠</h1>
            
            <div class="hud">
                <div>關卡: <span id="currentQNum">1</span> / 30</div>
                <div>分數: <span id="scoreBadge">💎 0</span></div>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="question-box" id="questionText">載入問題中...</div>
            
            <div class="options-container" id="optionsBox">
                <!-- JavaScript 動態置入選項 -->
            </div>

            <button class="hint-toggle" id="hintToggleBtn" onclick="toggleHint()">💡 需要魔法提示嗎？</button>
            <div class="hint-box" id="hintBox"></div>

            <div class="feedback-panel" id="feedbackPanel">
                <div class="feedback-text" id="feedbackTitle"></div>
                <div class="rationale-text" id="feedbackRationale"></div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">➡️ 下一關進發！</button>
            </div>
        </div>

        <!-- 遊戲結算畫面 -->
        <div class="result-screen" id="resultScreen">
            <h1>🎉 冒險完成！魔法結算 🎉</h1>
            <div class="star-rating" id="starRating">⭐⭐⭐</div>
            <p style="font-size: 1.3rem; margin: 15px 0;" id="finalScoreText"></p>
            <p style="color: var(--light-gold); line-height: 1.6;" id="evaluationText"></p>
            <button class="restart-btn" onclick="resetGame()">🔄 重新挑戰新冒險</button>
        </div>
    </div>

    <script>
        // 30題經過精心編排、正確選項完全打散在 0, 1, 2, 3 位置的題庫
        const questionDatabase = [
            {
                question: "開學排隊時，荳荳發現原本和自己排在一起的小辰變得比自己高，而排到了後面。關於這個現象，下列哪一項觀念最正確？",
                answerOptions: [
                    { text: "這代表小辰的身體發展很正常，荳荳的生長則完全停止了", isCorrect: false, rationale: "每個人的生長速度不同，即使暫時沒別人高，也不代表生長停止。" },
                    { text: "每個人的生長速度不同，只要養成良好習慣，就能健康長大", isCorrect: true, rationale: "生長速度具有個別差異，不需過度擔心，維持良好習慣最重要。" },
                    { text: "琪琪長得特別高，表示琪琪一定是班上最健康、完全不生病的人", isCorrect: false, rationale: "身高與是否生病沒有絕對關係，遺傳和營養才是關鍵因素。" },
                    { text: "荳荳應該立刻不吃正餐、大量喝含糖飲料來刺激自己快速長高", isCorrect: false, rationale: "含糖飲料和偏食會阻礙生長發育，是錯誤的生活習慣。" }
                ],
                hint: "課本提到「每個人的生長速度不同」，不用太擔心。"
            },
            {
                question: "琪琪的身高在班上特別顯眼，琪琪的爸媽長得也很高。琪琪爸媽說這與「遺傳」有關。關於「遺傳」，下列敘述何者正確？",
                answerOptions: [
                    { text: "遺傳是指後天透過大量重訓和吃藥改變的身體特徵", isCorrect: false, rationale: "遺傳是天生的，無法透過後天吃藥或運動來改變其基因基礎。" },
                    { text: "遺傳只會影響個人的膚色與智力，對身高的發展完全沒有任何關聯", isCorrect: false, rationale: "遺傳對身高、外表發育皆有顯著的影響。" },
                    { text: "遺傳是與生俱來的，無法改變，但我們可以透過後天方法幫助生長發育", isCorrect: true, rationale: "遺傳雖無法改變，但後天的睡眠、運動與營養補給能充分發揮生長潛力。" },
                    { text: "只要父母長得高，孩子後天不睡覺、不吃東西也一定會長得很高", isCorrect: false, rationale: "後天的生活習慣（睡眠、營養、運動）依然是影響發育的關鍵。" }
                ],
                hint: "遺傳是天生的，但後天還有三大關鍵因素可以努力。"
            },
            {
                question: "除了無法改變的遺傳因素之外，下列哪一組因素是我們後天可以努力調整、用來幫助身體良好生長發育的關鍵？",
                answerOptions: [
                    { text: "睡眠、運動、營養", isCorrect: true, rationale: "睡眠、規律運動與均衡營養，是打造健康生活與幫助長高的後天三大基石。" },
                    { text: "零食、看電視、打電動", isCorrect: false, rationale: "這些屬於應適量限制的習慣，過度接觸會危害身體健康與發育。" },
                    { text: "星座、血型、出生季節", isCorrect: false, rationale: "這些因素與身體的實質生長發育、長高並無科學上的因果關係。" },
                    { text: "衣服款式、剪指甲頻率、寫字速度", isCorrect: false, rationale: "這些是個人生活習慣與能力展現，與骨骼肌肉的生長發育無關。" }
                ],
                hint: "課本封面和內容不斷強調的三大健康生活關鍵。"
            },
            {
                question: "根據課本建議，處於兒童期的國小學生，每天至少需要睡足多少小時才夠？",
                answerOptions: [
                    { text: "每天至少睡足 5 小時", isCorrect: false, rationale: "5小時睡眠嚴重不足，會影響生長激素分泌與上課專注度。" },
                    { text: "每天至少睡足 6 小時", isCorrect: false, rationale: "6小時對正在發育的兒童而言依然不夠，容易導致免疫力下降。" },
                    { text: "每天至少睡足 8 小時", isCorrect: true, rationale: "課本明確指出，每天至少要睡足 8 小時，才能維持充足的生長與體力回復。" },
                    { text: "每天必須睡足 15 小時以上", isCorrect: false, rationale: "過度的睡眠會減少正常的運動與活動時間，對發育並無額外好處。" }
                ],
                hint: "請看課本第11頁「睡眠」小圖示中的紅字提示。"
            },
            {
                question: "為了促進肌肉與骨骼發育，課本建議兒童每天應該進行多長時間的運動？",
                answerOptions: [
                    { text: "每個月固定運動 30 分鐘", isCorrect: false, rationale: "運動頻率太低，無法達到促進發育和鍛鍊體魄的效果。" },
                    { text: "一天 30 分鐘", isCorrect: true, rationale: "課本第11頁明確建議，每天應規律運動 30 分鐘，以維持身體健康。" },
                    { text: "每週只需要在假日運動 5 分鐘", isCorrect: false, rationale: "5分鐘的時間無法有效刺激心肺功能與骨骼生長。" },
                    { text: "每天必須不間斷運動 8 小時以上", isCorrect: false, rationale: "過度運動會造成肌肉與關節嚴重運動傷害，違反健康原則。" }
                ],
                hint: "每天持續適度運動，才能幫助骨骼與肌肉健康發育。"
            },
            {
                question: "每個人從出生、長大到變老，會經過好幾個人生階段。請問「嬰幼兒期」一般是指哪一個年齡區間？",
                answerOptions: [
                    { text: "7 ~ 12 歲", isCorrect: false, rationale: "7~12歲屬於「兒童期」，此時已進入國小就學階段。" },
                    { text: "13 ~ 18 歲", isCorrect: false, rationale: "13~18歲屬於「青少年期」，開始注重外表與人際關係。" },
                    { text: "0 ~ 6 歲", isCorrect: true, rationale: "0~6歲為嬰幼兒期，此階段正在學坐、爬、站、走等基本能力。" },
                    { text: "19 ~ 64 歲", isCorrect: false, rationale: "19~64歲屬於長期的「成年期」，主要在努力工作與養育小孩。" }
                ],
                hint: "這個階段的小寶寶還需要家人全面的照顧，學會基本的爬行與走路。"
            },
            {
                question: "荳荳目前就讀國小三年級，會自己洗碗、做家事，也學會了騎腳踏車和寫字。請問她正處於哪一個人生階段？",
                answerOptions: [
                    { text: "兒童期（7 ~ 12 歲）", isCorrect: true, rationale: "兒童期的特徵是學會跳繩、騎腳踏車、做家事，並開始具備照顧自己的能力。" },
                    { text: "嬰幼兒期（0 ~ 6 歲）", isCorrect: false, rationale: "嬰幼兒期通常還在發展基礎移動能力，尚無法獨立完成洗碗與複雜家事。" },
                    { text: "青少年期（13 ~ 18 歲）", isCorrect: false, rationale: "青少年期為中學階段，特徵更傾向於重視人際關係與強烈的獨立感。" },
                    { text: "老年期（65 歲以上）", isCorrect: false, rationale: "老年期身體體力開始衰退，需要家人的陪伴與關心。" }
                ],
                hint: "對照自己的年齡與目前在學校學會的技能來做判斷。"
            },
            {
                question: "荳荳的哥哥和姐姐最近變得非常注重外表，特別重視人際關係，也渴望擁有獨立的空間。請問他們處於哪個人生階段？",
                answerOptions: [
                    { text: "兒童期", isCorrect: false, rationale: "兒童期較著重於基礎生活能力的提升與常規學習。" },
                    { text: "成年期", isCorrect: false, rationale: "成年期的核心在於努力工作、養育小孩與維持家庭生活。" },
                    { text: "老年期", isCorrect: false, rationale: "老年期主要面臨體力衰退，需要家人給予更多關懷與陪伴。" },
                    { text: "青少年期（13 ~ 18 歲）", isCorrect: true, rationale: "重視人際關係、喜歡獨立、開始注意外表，是青少年期典型的心理與社會發展特徵。" }
                ],
                hint: "國中到高中階段的青少年，心理上會展現出獨特的獨立需求。"
            },
            {
                question: "爸爸和媽媽每天努力工作，除了維持家庭生活外，還要養育小孩並照顧年邁的爺爺、奶奶。這符合哪個人生階段的特徵？",
                answerOptions: [
                    { text: "成年期（19 ~ 64 歲）", isCorrect: true, rationale: "成年期是家庭與社會的中流砥柱，肩負工作、養育下一代與奉養上一代的責任。" },
                    { text: "青少年期（13 ~ 18 歲）", isCorrect: false, rationale: "青少年主要身份為學生，尚未承擔養育小孩與維持家庭經濟的責任。" },
                    { text: "老年期（65 歲以上）", isCorrect: false, rationale: "老年期通常已從職場退休，體力開始衰退，轉為被照顧與陪伴的角色。" },
                    { text: "嬰幼兒期（0 ~ 6 歲）", isCorrect: false, rationale: "此階段完全需要仰賴家人的養育與悉心照顧。" }
                ],
                hint: "這個階段年齡跨度最長，是家中的經濟與照顧核心。"
            },
            {
                question: "爺爺和奶奶最近體力開始衰退，走起路來容易疲累，需要家人更多的陪伴與關心。他們正處於哪個人生階段？",
                answerOptions: [
                    { text: "兒童期", isCorrect: false, rationale: "兒童期的體力與運動能力正在蓬勃向上發展，而非衰退。" },
                    { text: "成年期", isCorrect: false, rationale: "成年期正值壯年，體能相對穩定，主要負責家庭的維持。" },
                    { text: "老年期（65 歲以上）", isCorrect: true, rationale: "老年期的特徵為生理機能與體力逐漸衰退，需要家庭成員給予心理與生活上的關懷。" },
                    { text: "青少年期", isCorrect: false, rationale: "青少年期體能正處於高峰發展階段。" }
                ],
                hint: "課本提到「65歲以上」，此時需要多加注意骨骼保健與陪伴。"
            },
            {
                question: "嬰幼兒的腸胃容量比較小，無法在正餐時一次吃下太多食物。根據課本飲食建議，應該如何調配其飲食？",
                answerOptions: [
                    { text: "在正餐之間可以適當補充點心，如麥片粥、水果泥、水煮蛋", isCorrect: true, rationale: "嬰幼兒採少量多餐原則，正餐間補充營養均衡的點心能提供足夠熱量。" },
                    { text: "正餐不給他們吃任何東西，只在深夜餵食冰淇淋與糖果", isCorrect: false, rationale: "冰淇淋與糖果缺乏必要營養，且會破壞腸胃健康。" },
                    { text: "強制他們像成年期一樣，每天只能吃一餐且必須吃全麥大魚大肉", isCorrect: false, rationale: "嬰幼兒消化系統未發育完全，強行餵食大量成人的固體食物會導致消化不良。" },
                    { text: "正餐之間絕對禁止吃任何東西，就算哭鬧也只能讓他們喝白開水", isCorrect: false, rationale: "這會導致嬰幼兒因攝取熱量不足而影響正常的生長發育。" }
                ],
                hint: "參考課本第14頁，嬰幼兒正餐之間適合補充軟質、營養的點心。"
            },

                    { text: "因為愛吃肉，所以計畫連續一個月完全不吃任何米飯與蔬果", isCorrect: false, rationale: "全肉飲食缺乏碳水化合物與維生素纖維，會損害腸胃與新陳代謝。" },
                    { text: "為了快速長高，計畫每餐都吃五個油炸雞腿便當", isCorrect: false, rationale: "過量油脂攝取會導致兒童肥胖，肥胖反而可能引發發育提前結束。" }
                ],
                hint: "參考課本第21頁「飲食均衡」底下的三個具體行動藍圖。"
            },
            {
                question: "在健康成長計畫的「睡眠充足」維度中，下列哪一項生活習慣調適可以有效提升睡眠品質、幫助長高？",
                answerOptions: [
                    { text: "睡前躺在床上連續打電動或看平板電腦兩小時", isCorrect: false, rationale: "3C產品的藍光會抑制褪黑激素分泌，導致失眠與大腦過度興奮。" },
                    { text: "在固定的時間睡覺，且睡前不使用 3C 產品、改做放鬆運動", isCorrect: true, rationale: "規律作息與睡前放鬆（如輕微伸展）能引導深層睡眠，促進生長激素高效分泌。" },
                    { text: "每天作業都拖延到凌晨兩點，再一邊吃麻辣燙一邊入睡", isCorrect: false, rationale: "熬夜與睡前重口味飲食會嚴重傷害消化道，徹底破壞睡眠結構。" },
                    { text: "每逢假日就連續熬夜48小時不睡覺，星期一再連續睡整天", isCorrect: false, rationale: "這種報復性作息會徹底打亂生理時鐘，對發育期的身體造成極大傷害。" }
                ],
                hint: "課本第21頁強調「睡前不使用3C產品」與「做放鬆運動」。"
            },
            {
                question: "規律運動能強健體魄。在擬定「規律運動」計畫時，下列哪一種作法最符合課本在「活力存摺」中的實踐建議？",
                answerOptions: [
                    { text: "只在體育課時稍微動一下手指，其餘時間完全躺著", isCorrect: false, rationale: "這完全無法達到每天30分鐘或假日固定運動的健康效益。" },
                    { text: "假日固定運動 1 小時，並可以用鬧鐘設定提醒、確實記錄運動時間", isCorrect: true, rationale: "透過時間記錄與鬧鐘提醒能建立規律習慣，與家人共同運動更能增進感情。" },
                    { text: "為了衝高記錄，連續二十四小時不間斷瘋狂長跑不休息", isCorrect: false, rationale: "這屬於極端過度運動，會引發肌肉溶解症或嚴重的骨骼關節受創。" },
                    { text: "把看電視體育頻道當作自己已經實際完成運動的記錄", isCorrect: false, rationale: "觀看節目屬於靜態視覺接觸，身體並未產生實質的肌肉與心肺鍛鍊。" }
                ],
                hint: "善用計時工具來協助自己持之以恆，也是課本第21頁推薦的聰明方法。"
            },
            {
                question: "在完成「成長大行動」健康計畫的擬定後，計畫表最下方有「健康宣言」與「見證人」的簽名欄位。請問「見證人」在計畫中扮演什麼角色？",
                answerOptions: [
                    { text: "見證人負責在旁邊監督，只要主角沒做到就立刻給予嚴厲的身體懲罰", isCorrect: false, rationale: "防災與健康教育強調的是正向鼓勵與家庭陪伴，非家庭暴力或嚴厲懲罰。" },
                    { text: "扮演陪伴、提醒與共同支持的角色，協助主角落實生活習慣的改進", isCorrect: true, rationale: "見證人（如爸媽、老師）能透過彼此關心，共同打造健康的家庭支持生活圈。" },
                    { text: "見證人只需要負責幫忙代簽名字，之後不需要關心對方的執行狀況", isCorrect: false, rationale: "敷衍的外在流於形式，無法達到課本強調「彼此關心生活」的教育宗旨。" },
                    { text: "見證人是負責在計畫失敗時，代替主角去承受所有生病或長不高的後果", isCorrect: false, rationale: "健康是每個人自己的責任，他人無法代替你的身體承受不健康習慣的後果。" }
                ],
                hint: "健康宣言需要家人的共同參與，這是一份充滿愛的陪伴與監督契約。"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        // 啟動遊戲
        function initGame() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('scoreBadge').innerText = `💎 0`;
            showQuestion();
        }

        // 渲染題目與選項
        function showQuestion() {
            document.getElementById('feedbackPanel').style.display = 'none';
            document.getElementById('hintBox').style.display = 'none';
            document.getElementById('hintBox').innerText = '';
            document.getElementById('hintToggleBtn').style.display = 'block';
            
            const currentQ = questionDatabase[currentQuestionIndex];
            
            // 更新進度條與HUD
            document.getElementById('currentQNum').innerText = currentQuestionIndex + 1;
            const progressPercent = ((currentQuestionIndex) / 30) * 100;
            document.getElementById('progressBar').style.width = `${progressPercent}%`;
            
            document.getElementById('questionText').innerText = `【第 ${currentQuestionIndex + 1} 關】${currentQ.question}`;
            
            // 渲染選項
            const optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = '';
            
            currentQ.answerOptions.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${idx + 1}. ${option.text}`;
                btn.onclick = () => checkAnswer(idx, btn);
                optionsBox.appendChild(btn);
            });
        }

        // 顯示魔法提示
        function toggleHint() {
            const hintBox = document.getElementById('hintBox');
            if (hintBox.style.display === 'block') {
                hintBox.style.display = 'none';
            } else {
                hintBox.innerText = `💡 魔法提示：${questionDatabase[currentQuestionIndex].hint}`;
                hintBox.style.display = 'block';
            }
        }

        // 檢查答案邏輯
        function checkAnswer(selectedIndex, clickedBtn) {
            const currentQ = questionDatabase[currentQuestionIndex];
            const allButtons = document.querySelectorAll('.option-btn');
            
            allButtons.forEach(btn => btn.disabled = true);
            document.getElementById('hintToggleBtn').style.display = 'none';
            document.getElementById('hintBox').style.display = 'none';

            const isCorrect = currentQ.answerOptions[selectedIndex].isCorrect;
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackRationale = document.getElementById('feedbackRationale');
            const gameWindow = document.getElementById('gameWindow');

            if (isCorrect) {
                score += 3.33; // 30題換算，極佳配分
                document.getElementById('scoreBadge').innerText = `💎 ${Math.round(score)}`;
                clickedBtn.classList.add('correct-ans');
                feedbackTitle.innerHTML = "哇！你好棒！完全正確！🌟💖🎉";
                feedbackTitle.style.color = "var(--correct-green)";
                gameWindow.classList.add('animate-correct');
                setTimeout(() => gameWindow.classList.remove('animate-correct'), 500);
            } else {
                clickedBtn.classList.add('wrong-ans');
                feedbackTitle.innerHTML = "差一點點，加油！我們再看一次觀念！💪💡😊";
                feedbackTitle.style.color = "var(--primary-gold)";
                
                // 亮出正確答案引導小朋友學習
                allButtons.forEach((btn, idx) => {
                    if (currentQ.answerOptions[idx].isCorrect) {
                        btn.classList.add('correct-ans');
                    }
                });
            }

            feedbackRationale.innerText = currentQ.answerOptions[selectedIndex].rationale;
            document.getElementById('feedbackPanel').style.display = 'block';
        }

        // 進入下一題
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionDatabase.length) {
                showQuestion();
            } else {
                endGame();
            }
        }

        // 結算畫面
        function endGame() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('progressBar').style.width = `100%`;

            const finalScoreText = document.getElementById('finalScoreText');
            const starRating = document.getElementById('starRating');
            const evaluationText = document.getElementById('evaluationText');
            const finalRoundedScore = Math.round(score > 100 ? 100 : score);

            finalScoreText.innerText = `冒險總得分：${finalRoundedScore} 分！`;
            triggerConfetti();

            if (finalRoundedScore >= 95) {
                starRating.innerText = "⭐⭐⭐⭐⭐";
                evaluationText.innerText = "太完美了！你獲得了『全能健康成長大師』最高稱號！👑✨ 你已經完全了解人生各階段的飲食調整，掌握了睡眠、規律運動、不偏食的健康密碼，是班上最棒的健康模範生！💖";
            } else if (finalRoundedScore >= 80) {
                starRating.innerText = "⭐⭐⭐⭐";
                evaluationText.innerText = "非常出色！你獲得了『成長發育智多星』徽章！🌟 你非常清楚如何協助家人和自己規劃均衡飲食菜單，只要在日常生活中認真貫徹計畫，你一定會健康茁壯長大！👍";
            } else if (finalRoundedScore >= 60) {
                starRating.innerText = "⭐⭐⭐";
                evaluationText.innerText = "恭喜過關！你獲得了『健康生活見習生』稱號！💪 你已經明白少喝含糖飲料、多喝水以及六大類均衡飲食的概念。建議可以再次挑戰，讓自己的成長計畫防護網更加完美喔！😊";
            } else {
                starRating.innerText = "⭐";
                evaluationText.innerText = "這次大冒險的題目細節很多，答錯了也不要灰心！😊 每一題選項後面的解析都是幫你身體長高的營養劑，重新再玩一次，相信下一次你絕對能突破自我、拿到滿分！💪🔥";
            }
        }

        // 紙屑噴發特效
        function triggerConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#D4AF37', '#FFFFFF', '#FFD700', '#FF8C00', '#4169E1', '#32CD32'];
            
            for (let i = 0; i < 90; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = `${Math.random() * 1.5}s`;
                confetti.style.animationDuration = `${2 + Math.random() * 2}s`;
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(confetti);
            }
        }

        function resetGame() {
            initGame();
        }

        // 啟動
        document.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
    </script>
</body>
</html>
