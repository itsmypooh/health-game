<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火場生存與急救大冒險 🚒🔥</title>
    <style>
        /* 核心魔法可愛風格：黑、金、白與柔和點綴色 */
        :root {
            --bg-color: #181818;
            --primary-gold: #D4AF37;
            --light-gold: #F3E5AB;
            --text-white: #FFFFFF;
            --card-bg: #2A2A2A;
            --btn-hover: #3E3E3E;
            --correct-green: #2ECC71;
            --wrong-red: #E74C3C;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
            border: 2px solid var(--primary-gold);
            position: relative;
        }

        h1 {
            color: var(--primary-gold);
            text-align: center;
            font-size: 1.8rem;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 頂部進度條與資訊 */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary-gold);
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: #444;
            border-radius: 6px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-gold), #FFF);
            transition: width 0.3s ease;
        }

        /* 題目區域 */
        .question-box {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 70px;
        }

        /* 選項按鈕 */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: #333;
            color: var(--text-white);
            border: 1px solid #555;
            padding: 15px 20px;
            font-size: 1.05rem;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .option-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: var(--primary-gold);
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        /* 答題回饋效果 */
        .option-btn.correct-ans {
            background-color: var(--correct-green) !important;
            border-color: var(--correct-green) !important;
            color: #fff;
        }

        .option-btn.wrong-ans {
            background-color: var(--wrong-red) !important;
            border-color: var(--wrong-red) !important;
            color: #fff;
        }

        /* 提示與回饋面板 */
        .feedback-panel {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--primary-gold);
            animation: fadeIn 0.4s ease;
        }

        .feedback-text {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .rationale-text {
            font-size: 0.95rem;
            color: #DDD;
            line-height: 1.5;
        }

        .next-btn, .restart-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--primary-gold), #B8860B);
            color: black;
            font-weight: bold;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(212,175,55,0.3);
            transition: all 0.2s ease;
        }

        .next-btn:hover, .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(212,175,55,0.5);
        }

        .hint-toggle {
            background: none;
            border: none;
            color: var(--primary-gold);
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: underline;
            padding: 5px;
            margin-top: 10px;
        }

        .hint-box {
            display: none;
            background: #222;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--light-gold);
            margin-top: 5px;
            border-left: 3px solid var(--primary-gold);
        }

        /* 華麗動畫特效 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-correct {
            animation: popStars 0.5s ease;
        }

        @keyframes popStars {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); box-shadow: 0 0 20px var(--correct-green); }
            100% { transform: scale(1); }
        }

        /* 慶祝彩色碎紙粒子效果容器 */
        .confetti-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 99;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f00;
            opacity: 0;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
        }

        /* 結算頁面 */
        .result-screen {
            text-align: center;
            display: none;
        }

        .star-rating {
            font-size: 3rem;
            color: var(--primary-gold);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameWindow">
        <div id="confettiContainer" class="confetti-container"></div>
        
        <div id="quizScreen">
            <h1>🚒 火場生存與急救大冒險 🧠</h1>
            
            <div class="hud">
                <div>進度: <span id="currentQNum">1</span> / 25</div>
                <div>得分: <span id="scoreBadge">⭐ 0</span></div>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="question-box" id="questionText">載入問題中...</div>
            
            <div class="options-container" id="optionsBox">
                </div>

            <button class="hint-toggle" id="hintToggleBtn" onclick="toggleHint()">💡 需要魔法提示嗎？</button>
            <div class="hint-box" id="hintBox"></div>

            <div class="feedback-panel" id="feedbackPanel">
                <div class="feedback-text" id="feedbackTitle"></div>
                <div class="rationale-text" id="feedbackRationale"></div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">➡️ 下一關進發！</button>
            </div>
        </div>

        <div class="result-screen" id="resultScreen">
            <h1>🎉 冒險完成！魔法結算 🎉</h1>
            <div class="star-rating" id="starRating">⭐⭐⭐</div>
            <p style="font-size: 1.3rem; margin: 15px 0;" id="finalScoreText"></p>
            <p style="color: var(--light-gold); line-height: 1.6;" id="evaluationText"></p>
            <button class="restart-btn" onclick="resetGame()">🔄 重新挑戰新冒險</button>
        </div>
    </div>

    <script>
        // 25題經過隨機分配正確答案位置的高誘答性題目庫（答案已徹底打散在不同索引位置）
        const questionDatabase = [
            {
                question: "當行走在路上發現自家公寓高樓層不幸失火，第一時間最正確且安全的應變步驟順序為何？",
                answerOptions: [
                    { text: "迅速自行搭乘電梯回火場確認受困家人人數，再打119報案", isCorrect: false, rationale: "火災時搭乘電梯極易因斷電受困，且會延誤報案時機，造成更嚴重死傷。" },
                    { text: "大聲向周邊鄰居示警喊失火，同時立刻撥打119向消防局精確報案", isCorrect: true, rationale: "先大聲示警能爭取鄰居逃生黃金時間，並立即報案能讓消防隊儘早出動撲滅火源。" },
                    { text: "為了不打擾鄰居，先安靜地用手機上網查詢起火大樓的精確通訊地址", isCorrect: false, rationale: "隱瞞火訊會使周邊鄰居錯失逃生先機，且報案應以口頭快速說明已知地標為主。" },
                    { text: "立刻衝進火場通道維持巷道暢通，以便等一下消防車能直接開進去", isCorrect: false, rationale: "未經裝備防護切勿盲目衝入火場，維持通道應在安全處協助或引導，而非冒險涉入。" }
                ],
                hint: "考量生命安全第一，且必須兼顧自身防護與大眾預警的順序。"
            },
            {
                question: "在撥打119火災報案時，哪一項資訊在程序上是消防局最核心需要優先得知、絕不能漏掉的？",
                answerOptions: [
                    { text: "報案人目前的行動電話號碼與詳細通訊錄", isCorrect: false, rationale: "姓名與電話雖需報上，但非最首要的核心救援部署指標，地點錯誤則完全無法救援。" },
                    { text: "起火點屋主的個人基本資料與財產估計損失", isCorrect: false, rationale: "火災當下財產損失非救災急迫資訊，首要任務是救人與控管火勢。" },
                    { text: "現場圍觀群眾的確切人數與交通工具類型", isCorrect: false, rationale: "圍觀人數與交通工具與滅火、搜救受困者無直接關聯。" },
                    { text: "起火點的精確地點與樓層", isCorrect: true, rationale: "精確地點與樓層能讓消防人員第一時間派遣正確分隊與適當高度的雲梯車進行救援。" }
                ],
                hint: "消防車出動時，他們最需要知道「要把車開去哪裡」以及「多高的梯子才夠」。"
            },
            {
                question: "消防車抵達火災現場時，身為附近居民或逃生出來的當事人，下列哪一項行為最能實際協助救災？",
                answerOptions: [
                    { text: "主動保持消防通道暢通，並前往巷口引導消防車進入，且確認受困人數告知消防員", isCorrect: true, rationale: "保持通道與精確回報人數可讓消防員迅速展開特搜，避免盲目搜索延誤時機。" },
                    { text: "留在火場最前線近距離圍觀，以便隨時幫忙消防員拉住強力噴水高壓水帶", isCorrect: false, rationale: "圍觀群眾會妨礙救災動線，且高壓水帶具有強大後座力，非專業人員極易受傷。" },
                    { text: "迅速將自家的汽車或機車移到阻擋巷道的違規車輛前方攔截它", isCorrect: false, rationale: "這會造成巷道更嚴重的死結與堵塞，應配合協助移走堵塞車輛而非增加路障。" },
                    { text: "不顧勸阻立即獨自衝進去火場搜救，以展現互助美德", isCorrect: false, rationale: "無裝備進入只會讓自己成為新的受困者，反而加重消防人員的搜救負擔。" }
                ],
                hint: "思考如何提供清晰資訊，並避免阻礙專業人員的救災動線。"
            },
            {
                question: "火災現場常常有人因為好奇而圍觀。關於「圍觀火災現場」所造成的危害，下列敘述何者最精確？",
                answerOptions: [
                    { text: "主要是因為圍觀會干擾消防員的心理專注度，使其無法精準操作滅火器具", isCorrect: false, rationale: "消防員皆受過專業抗壓訓練，圍觀實質危害主要是空間受阻與群眾人身安全暴露危險。" },
                    { text: "會堵塞逃生動線與消防車進出通道，且可能因火場突發爆炸或濃煙擴散而受傷", isCorrect: true, rationale: "群眾聚集會妨礙救災車輛，火場也隨時有閃燃、爆裂物或有毒濃煙侵襲的風險。" },
                    { text: "會導致報案專線119因現場干擾而產生音訊斷訊的電磁問題", isCorrect: false, rationale: "人群聚集不會導致基地台斷訊，兩者無直接因果關係。" },
                    { text: "會增加現場醫護人員幫忙包紮傷口的困難度，因為圍觀者會搶奪紗布", isCorrect: false, rationale: "圍觀者通常不會搶奪物資，其主要危害是阻礙交通與自身安全威脅。" }
                ],
                hint: "從實體空間阻礙與動態火場環境的突發危險性去思考。"
            },
            {
                question: "救災過程中，消防人員特別強調必須「確認家中有幾個人受困」，其主要的核心考量是什麼？",
                answerOptions: [
                    { text: "為了填寫內政部消防署的救災行政報表與保險理賠核算", isCorrect: false, rationale: "現場搜救以拯救人命為唯一急迫目標，行政報表與保險均為事後處理。" },
                    { text: "用來判定這場火災的嚴重等級，決定是否需要向鄰近國家申請跨國援助", isCorrect: false, rationale: "地方火災的人數確認是為了前線搜救，與跨國援助等級無關。" },
                    { text: "以便調派正確數量的特搜隊員進行精準搜救，避免盲目搜索與資源虛耗", isCorrect: true, rationale: "得知確切受困人數與位置能讓搜救方針更明確，大幅提升救出受困者的成功率。" },
                    { text: "為了計算需要派發多少個防煙面罩給現場圍觀的民眾", isCorrect: false, rationale: "防煙面罩是給受困者及消防員使用，非發放給圍觀民眾。" }
                ],
                hint: "在黃金搜救時間內，時間與人力都是有限的，資訊必須精準。"
            },
            {
                question: "在火場求生中，若不幸遭遇身上衣物著火，根據「停、躺、滾」三大安全步驟，下列動作何者完全正確？",
                answerOptions: [
                    { text: "迅速快速奔跑，希望藉由迎面而來的強風將身上的火焰吹熄", isCorrect: false, rationale: "奔跑會帶入大量新鮮氧氣，引發空氣助燃，反而使火勢更加劇烈燃燒。" },
                    { text: "立即用脫下的鞋子或雙手掌用力拍打身體著火處，試圖將火源拍滅", isCorrect: false, rationale: "用手拍打極易導致雙手嚴重燒燙傷，增加身體受創面積。" },
                    { text: "立刻就地躺下，用雙手摀住臉部，在地面左右翻滾直到火勢熄滅", isCorrect: true, rationale: "躺下能防火焰燒向面部，翻滾可隔絕空氣滅火，雙手摀臉能降低顏面傷殘機率。" },
                    { text: "維持站立姿勢，並將雙手平貼在大腿上，靜止不動等待消防隊救援", isCorrect: false, rationale: "站立會使火焰順著衣物向上燃燒，迅速灼傷呼吸道與頭部，非常危險。" }
                ],
                hint: "奔跑會帶進更多氧氣；而火焰的特性是向上燃燒，所以姿勢與遮蔽面部很重要。"
            },
            {
                question: "在執行「停、躺、滾」的翻滾動作時，為什麼「越貼近地面翻滾」滅火效果越好？",
                answerOptions: [
                    { text: "因為地面的溫度通常比空氣高，可以把火源逆向吸乾", isCorrect: false, rationale: "地面溫度一般較低，但其滅火原理是隔絕空氣而非熱量吸附。" },
                    { text: "因為能更有效地阻絕空氣，達到窒息法的滅火效果", isCorrect: true, rationale: "身體緊貼地面能有效壓迫著火點，隔絕燃燒所需的氧氣，使火勢熄滅。" },
                    { text: "因為地面含有微量的抗燃化學元素，能自動抑制火焰分子", isCorrect: false, rationale: "普通地面並不含有化學滅火劑，純粹是物理隔絕空氣的機制。" },
                    { text: "因為貼近地面翻滾可以產生微小的局部真空重力場", isCorrect: false, rationale: "翻滾無法改變或產生重力場，這不符合物理常識。" }
                ],
                hint: "燃燒需要三要素：可燃物、助燃物（氧氣）、熱源。翻滾是切斷哪一個？"
            },
            {
                question: "根據統計，住宅廚房是房子裡最容易發生火災的高風險場所。下列哪一項是廚房火災最主要成因？",
                answerOptions: [
                    { text: "抽油煙機因為定期清洗得太乾淨，導致電線短路", isCorrect: false, rationale: "抽油煙機累積過多油垢才是引燃的風險，清洗乾淨能有效降低火災機率。" },
                    { text: "廚房使用的不鏽鋼鍋具在加熱時釋放出可燃性氣體", isCorrect: false, rationale: "合格的不鏽鋼鍋具在正常加熱下不會釋放可燃性氣體。" },
                    { text: "烹煮食物時人離開卻未關閉爐火，導致乾燒或油鍋起火", isCorrect: true, rationale: "「人離火未熄」是廚房火災的第一大主因，極易導致鍋具燒焦並引燃周邊可燃物。" },
                    { text: "洗碗機在運作過程中因為大量微波產生高溫紅外線而自燃", isCorrect: false, rationale: "洗碗機不使用微波原理，這屬於錯誤的電器認知。" }
                ],
                hint: "謹記「人離火熄」的黃金生活安全原則。"
            },
            {
                question: "當家人正在廚房烹煮湯麵，此時客廳的電話突然響起，下列哪一種作法最符合「防災安全意識」？",
                answerOptions: [
                    { text: "直接跑去客廳接電話，心想湯麵剛放下去煮，一定不會有事", isCorrect: false, rationale: "許多廚房火災皆因「講電話講太久忘記時間」而引發乾燒。" },
                    { text: "先關閉爐火，確認火熄滅後，再去客廳接聽電話", isCorrect: true, rationale: "遵循「人離火熄」原則，即便只是離開幾分鐘，也必須先關火以防萬一。" },
                    { text: "大聲叫客廳的貓咪去幫忙接電話，自己一邊看著爐火", isCorrect: false, rationale: "寵物並無操作電器或接聽電話的能力，此行為無法解決問題。" },
                    { text: "把爐火開到最大讓它快點滾，自己迅速跑去接電話再跑回來", isCorrect: false, rationale: "加大火力會加速湯汁溢出或燒乾，極度危險，會大幅提高火災機率。" }

                    { text: "拉（拉開安全插梢）-> 瞄（瞄向火源底部）-> 壓（壓握把噴出）-> 掃（左右移動掃射）", isCorrect: true, rationale: "「拉、瞄、壓、掃」為標準滅火器操作四步驟，瞄準底部才能有效切斷燃燒基底。" },
                    { text: "瞄（先瞄準火源頂端）-> 拉（用力拉斷噴管）-> 掃（原地大範圍掃地）-> 壓（壓低身體防止跌倒）", isCorrect: false, rationale: "順序與動作皆錯，滅火必須先拉插梢，且須瞄準火源底部而非頂端。" },
                    { text: "拉（拉起警報器開關）-> 壓（壓住傷口止血）-> 瞄（瞄準鏡頭拍照）-> 掃（掃描QR碼報案）", isCorrect: false, rationale: "這完全脫離了滅火器的實際操作程序，屬於混淆選項。" }
                ],
                hint: "第一個動作一定是解除安全鎖（插梢），接著要對準火的根部（底部）噴射。"
            },
            {
                question: "當家中成員不幸發生皮膚燒燙傷時，在送醫前必須執行急救5步驟。請選出正確的步驟順序：",
                answerOptions: [
                    { text: "脫（先扯掉黏住的衣服）-> 沖（高壓水柱沖刷）-> 蓋（厚棉過度保護）-> 泡（泡熱水）-> 送（趕快送醫）", isCorrect: false, rationale: "硬扯衣物會撕裂受損皮膚，泡熱水會加劇熱傷，皆是嚴重錯誤行為。" },
                    { text: "沖（沖水15~30分）-> 脫（小心除去衣物）-> 泡（持續泡冷水）-> 蓋（乾淨紗布覆蓋）-> 送（趕快送醫）", isCorrect: true, rationale: "標準「沖、脫、泡、蓋、送」流程能有效降低皮膚深層熱傷害、防止感染並及時就醫。" },
                    { text: "沖（沖洗傷口）-> 蓋（塗抹厚重牙膏覆蓋）-> 脫（脫掉鞋子）-> 泡（浸泡鹽水）-> 送（不予就醫）", isCorrect: false, rationale: "塗牙膏或泡鹽水會刺激傷口並引發嚴重感染，屬於民間錯誤偏方。" },
                    { text: "送（直接抬起傷者送醫）-> 沖（到醫院再沖熱水）-> 脫（在救護車上強行撕開外衣）", isCorrect: false, rationale: "未在第一時間沖冷水降溫會使熱能持續灼傷深層組織，強行撕開外衣會擴大傷口。" }
                ],
                hint: "第一步一定是先用流動的冷水幫滾燙的皮膚「降溫」，也就是「沖」。"
            },
            {
                question: "在處理燒燙傷的過程中，下列哪一項行為是科學上公認「正確」且「能防止傷口感染」的照顧作法？",
                answerOptions: [
                    { text: "發現衣服與傷口焦黑黏在一起時，務必使出最大力氣將衣服硬扯分開", isCorrect: false, rationale: "硬扯會將未分離的皮膚一併撕下，造成嚴重的二次大面積創傷。" },
                    { text: "立刻在傷口上塗抹厚厚一層牙膏或醬油，利用清涼感來達到化學消炎效果", isCorrect: false, rationale: "牙膏與醬油會蓄積熱量且含有細菌，會干擾醫師診斷並大幅提高感染率。" },
                    { text: "保持燙傷產生的水泡完整、絕對不可故意弄破，且不隨意塗抹未經醫囑的偏方或外用藥", isCorrect: true, rationale: "水泡表皮是天然的無菌保護層，弄破或亂塗偏方（如牙膏、萬金油）極易引發細菌感染與組織壞死。" },
                    { text: "將傷口浸泡在高度濃縮的鹽水或酒精中，進行高強度的強制殺菌", isCorrect: false, rationale: "高濃度鹽水或酒精會對裸露的真皮組織造成劇烈脫水與化學灼傷，破壞細胞再生。" }
                ],
                hint: "皮膚受傷後非常脆弱。不要亂擦廚房或浴室裡不是藥品的東西，保護身體自然的保護水泡。"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        // 啟動魔法遊戲
        function initGame() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('scoreBadge').innerText = `⭐ 0`;
            showQuestion();
        }

        // 渲染題目與選項
        function showQuestion() {
            // 重置提示與回饋面板
            document.getElementById('feedbackPanel').style.display = 'none';
            document.getElementById('hintBox').style.display = 'none';
            document.getElementById('hintBox').innerText = '';
            document.getElementById('hintToggleBtn').style.display = 'block';
            
            const currentQ = questionDatabase[currentQuestionIndex];
            
            // 更新進度條與文字
            document.getElementById('currentQNum').innerText = currentQuestionIndex + 1;
            const progressPercent = ((currentQuestionIndex) / 25) * 100;
            document.getElementById('progressBar').style.width = `${progressPercent}%`;
            
            document.getElementById('questionText').innerText = `【第 ${currentQuestionIndex + 1} 關】${currentQ.question}`;
            
            // 渲染選項
            const optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = '';
            
            currentQ.answerOptions.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option.text;
                btn.onclick = () => checkAnswer(idx, btn);
                optionsBox.appendChild(btn);
            });
        }

        // 顯示魔法提示
        function toggleHint() {
            const hintBox = document.getElementById('hintBox');
            if (hintBox.style.display === 'block') {
                hintBox.style.display = 'none';
            } else {
                hintBox.innerText = `💡 魔法提示：${questionDatabase[currentQuestionIndex].hint}`;
                hintBox.style.display = 'block';
            }
        }

        // 檢查答案
        function checkAnswer(selectedIndex, clickedBtn) {
            const currentQ = questionDatabase[currentQuestionIndex];
            const allButtons = document.querySelectorAll('.option-btn');
            
            // 禁用所有按鈕，防止重複點擊
            allButtons.forEach(btn => btn.disabled = true);
            document.getElementById('hintToggleBtn').style.display = 'none';
            document.getElementById('hintBox').style.display = 'none';

            const isCorrect = currentQ.answerOptions[selectedIndex].isCorrect;
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackRationale = document.getElementById('feedbackRationale');
            const gameWindow = document.getElementById('gameWindow');

            if (isCorrect) {
                score += 4; // 每題4分，總分100
                document.getElementById('scoreBadge').innerText = `⭐ ${score}`;
                clickedBtn.classList.add('correct-ans');
                feedbackTitle.innerHTML = "哇！你好棒！完全正確！🌟💖🎉";
                feedbackTitle.style.color = "var(--correct-green)";
                gameWindow.classList.add('animate-correct');
                setTimeout(() => gameWindow.classList.remove('animate-correct'), 500);
            } else {
                clickedBtn.classList.add('wrong-ans');
                feedbackTitle.innerHTML = "差一點點，加油！我們再看一次觀念！💪💡😊";
                feedbackTitle.style.color = "var(--primary-gold)";
                
                // 高亮顯示正確答案給小朋友學習
                allButtons.forEach((btn, idx) => {
                    if (currentQ.answerOptions[idx].isCorrect) {
                        btn.classList.add('correct-ans');
                    }
                });
            }

            feedbackRationale.innerText = currentQ.answerOptions[selectedIndex].rationale;
            document.getElementById('feedbackPanel').style.display = 'block';
        }

        // 進入下一題
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionDatabase.length) {
                showQuestion();
            } else {
                endGame();
            }
        }

        // 遊戲結束結算
        function endGame() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('progressBar').style.width = `100%`;

            const finalScoreText = document.getElementById('finalScoreText');
            const starRating = document.getElementById('starRating');
            const evaluationText = document.getElementById('evaluationText');

            finalScoreText.innerText = `冒險總得分：${score} 分！`;

            // 華麗彩色碎紙煙火效果
            triggerConfetti();

            // 依分數給予正向評價與星星
            if (score === 100) {
                starRating.innerText = "⭐⭐⭐⭐⭐";
                evaluationText.innerText = "太完美了！你獲得了『終極火場生存大法師』稱號！👑✨ 你已經完全掌握了所有居家用電、火災報案程序、逃生守則與燒燙傷急救技巧，能夠完美保護自己與家人！💖";
            } else if (score >= 80) {
                starRating.innerText = "⭐⭐⭐⭐";
                evaluationText.innerText = "太厲害了！你獲得了『高級防災小尖兵』徽章！🌟 你的安全意識非常高，只要稍微再注意細微的誘答概念，你就是最棒的防災專家囉！👍";
            } else if (score >= 60) {
                starRating.innerText = "⭐⭐⭐";
                evaluationText.innerText = "恭喜及格！你獲得了『安全守護見習生』稱號！💪 你已經了解基礎的沖脫泡蓋送與逃生觀念，建議可以再重新挑戰一次，讓自己的魔法防護罩變得更堅固喔！😊";
            } else {
                starRating.innerText = "⭐";
                evaluationText.innerText = "這次的冒險雖然有點難度，但沒關係，失敗是成功的基石！😊 每一題選項中的小叮嚀都是珍貴的求生知識，再接再厲，下一趟冒險你一定會大發神威！💪🔥";
            }
        }

        // 煙火紙屑粒子生成器
        function triggerConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#D4AF37', '#FFFFFF', '#FFD700', '#FF4500', '#32CD32', '#1E90FF'];
            
            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = `${Math.random() * 2}s`;
                confetti.style.animationDuration = `${1.5 + Math.random() * 2}s`;
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(confetti);
            }
        }

        // 重新開始遊戲
        function resetGame() {
            initGame();
        }

        // 網頁載入完成後啟動遊戲
        document.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
    </script>
